name: Deploy Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      proxyip:
        description: 'Optional: Enter a specific Proxy IP for this run'
        required: false
        default: 'di.nscl.ir'
      uuid:
        description: 'Optional: Enter a specific UUID for this run'
        required: false
        default: 'be0ff9df-1468-41a0-8865-796d1c6800db'

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Deploy via Wrangler Action
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          vars: |
            UUID
            PROXYIP
        env:
          UUID: ${{ inputs.uuid || secrets.UUID || 'be0ff9df-1468-41a0-8865-796d1c6800db' }}
          PROXYIP: ${{ inputs.proxyip || secrets.PROXYIP || 'di.nscl.ir' }}
